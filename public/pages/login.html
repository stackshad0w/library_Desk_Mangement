<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — EduTrack</title>
  <meta name="description" content="Sign in to EduTrack Student Management System">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages/login.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/></svg>
        </div>
        <div>
          <div class="logo-text">EduTrack</div>
          <div class="logo-sub">Management System</div>
        </div>
      </div>
      <h1 class="login-title">Welcome Back</h1>
      <p class="login-subtitle">Sign in to your account to continue</p>
      <div class="login-error" id="login-error"></div>
      <form class="login-form" id="login-form">
        <div class="form-group">
          <label for="login-username">Username or Email</label>
          <input type="text" id="login-username" placeholder="Enter username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Enter password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" id="login-btn">Sign In</button>
      </form>
      <div class="login-footer">
        <p>Default credentials: <strong>admin</strong> / <strong>admin123</strong></p>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"><div class="toast-dot" id="toast-dot"></div><span id="toast-msg"></span></div>
  <script type="module">
    import { api } from '/js/modules/api.js';

    // Redirect if already logged in
    if (api.getToken()) {
      window.location.href = '/pages/dashboard.html';
    }

    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;
        const data = await api.post('/auth/login', { username, password });
        api.setToken(data.token);
        api.setRefreshToken(data.refreshToken);
        api.setUser(data.user);
        window.location.href = '/pages/dashboard.html';
      } catch (err) {
        errorEl.textContent = err.message || 'Login failed';
        errorEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
